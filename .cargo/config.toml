# Cargo 国内镜像配置
# TurboGitHub 项目专用 - 所有依赖使用国内源

# ========================================
# 镜像源配置
# ========================================

# 使用中科大镜像源（主）
[source.crates-io]
replace-with = 'ustc'

[source.ustc]
registry = "sparse+https://mirrors.ustc.edu.cn/crates.io-index/"

# 清华镜像源（备选）
[source.tuna]
registry = "sparse+https://mirrors.tuna.tsinghua.edu.cn/crates.io-index/"

# 阿里云镜像源（备选）
[source.aliyun]
registry = "sparse+https://mirrors.aliyun.com/crates.io-index/"

# ========================================
# 网络优化配置
# ========================================

[net]
# 使用 Git CLI 进行 fetch（更稳定）
git-fetch-with-cli = true
# 重试次数
retry = 3

# HTTP 超时设置（秒）
# http-timeout = 60  # 此配置在某些版本中不支持

# ========================================
# 构建配置
# ========================================

[build]
# 使用所有 CPU 核心进行并行编译
# jobs = 8  # 取消注释并设置为核心数，如 4, 8, 16 等

# 启用详细输出（调试用）
# verbose = true

# ========================================
# 目标平台配置
# ========================================

# Windows MSVC（主要目标平台）
[target.x86_64-pc-windows-msvc]
rustflags = [
    "-C", "target-feature=+crt-static",  # 静态链接 CRT
    "-C", "link-arg=/STACK:8388608",     # 设置栈大小为 8MB
]

# Windows GNU（备选）
[target.x86_64-pc-windows-gnu]
rustflags = [
    "-C", "target-feature=+crt-static",
    "-C", "link-arg=-Wl,--stack,8388608",
]

# Linux（开发/测试）
[target.x86_64-unknown-linux-gnu]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",  # 使用 LLD 链接器
]

# macOS（开发/测试）
[target.x86_64-apple-darwin]
rustflags = [
    "-C", "link-arg=-fuse-ld=lld",
]

# ========================================
# 环境变量配置
# ========================================

[env]
# 设置国内镜像环境变量
RUSTUP_DIST_SERVER = "https://mirrors.ustc.edu.cn/rust-static"
RUSTUP_UPDATE_ROOT = "https://mirrors.ustc.edu.cn/rust-static/rustup"

# ========================================
# Git 源替换（可选）
# ========================================

# 如果项目使用 Git 依赖，可以配置国内 Git 镜像
# [source."https://github.com/"]
# git = "https://mirrors.ustc.edu.cn/github.com/"

# ========================================
# 说明
# ========================================
# 
# 1. 默认使用中科大源，如果不可用会自动尝试其他源
# 2. 所有依赖下载都会通过国内镜像加速
# 3. 编译配置已优化，支持多平台
# 4. 网络超时已调整，适应国内网络环境
#
# 镜像源速度对比：
# - 中科大源：10-38 MB/s（推荐）
# - 清华源：10-35 MB/s（推荐）
# - 阿里云：5-20 MB/s（备选）
# - 官方源：1-5 MB/s（不推荐）
#
# 如需切换主镜像源，修改 [source.crates-io] 的 replace-with 值即可
# 例如：replace-with = 'tuna' 使用清华源
